name: saifitv
description: "Saifi TV – Islamic Videos: Naats, Bayanat, Quran, Prayer Times & More"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.1

  # Firebase

  # YouTube Player
  youtube_player_flutter: ^9.1.1

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15

  # HTTP
  http: ^1.2.2
  dio: ^5.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Navigation & Utils
  go_router: ^14.3.0
  provider: ^6.1.2
  intl: ^0.19.0

  # Qibla & Location
  geolocator: ^13.0.0
  flutter_qiblah: ^3.1.0
  geocoding: ^3.0.0

  # Vibration & Haptics
  vibration: ^2.0.0

  # URL Launcher
  url_launcher: ^6.3.1

  # Connectivity
  connectivity_plus: ^6.1.0

  # Lottie (animations)
  lottie: ^3.1.2

  # Share
  share_plus: ^10.1.2
  screenshot: ^3.0.0
  path_provider: ^2.1.4

  # Cached Network Image
  cached_network_image: ^3.4.1

  # Flutter SVG
  flutter_svg: ^2.0.10+1

  # Hijri Calendar
  hijri: ^3.0.1

  # Shimmer loading
  shimmer: ^3.0.0
  flutter_local_notifications: ^19.5.0
  permission_handler: ^12.0.3
  workmanager: ^0.7.0
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#163D29"
  android_12:
    color: "#163D29"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
